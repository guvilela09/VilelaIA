services:
  - type: web
    name: vilelaia-api
    env: node
    plan: free
    root: artifacts/api-server
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
